<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criminal Database</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #1e3c72;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .criminal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        
        .criminal-item {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #dc3545;
            position: relative;
        }
        
        .criminal-item h3 {
            color: #dc3545;
            margin-bottom: 10px;
        }
        
        .criminal-item p {
            margin: 5px 0;
            color: #666;
        }
        
        .criminal-item strong {
            color: #333;
        }
        
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .edit-btn, .delete-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            text-align: center;
            display: inline-block;
            transition: all 0.3s;
        }
        
        .edit-btn {
            background: #007bff;
            color: white;
        }
        
        .edit-btn:hover {
            background: #0056b3;
        }
        
        .delete-btn {
            background: #dc3545;
            color: white;
        }
        
        .delete-btn:hover {
            background: #c82333;
        }
        
        .back-button {
            display: inline-block;
            padding: 15px 30px;
            background: #1e3c72;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s;
            margin-bottom: 20px;
        }
        
        .back-button:hover {
            background: #2a5298;
        }
        
        .stats {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-button">⬅️ Back to Home</a>
        
        <h1>📋 Criminal Database</h1>
        
        <div class="stats">
            <h2>Total Criminals: {{ criminals|length }}</h2>
        </div>
        
        <div class="criminal-grid">
            {% for criminal in criminals %}
            <div class="criminal-item">
                <h3>{{ criminal.name }}</h3>
                <p><strong>Crime:</strong> {{ criminal.crime }}</p>
                <p><strong>Status:</strong> {{ criminal.status }}</p>
                <p><strong>Location:</strong> {{ criminal.location }}</p>
                <p><strong>Nationality:</strong> {{ criminal.nationality }}</p>
                
                <div class="action-buttons">
                    <a href="{{ url_for('edit_criminal', name=criminal.name) }}" class="edit-btn">Edit</a>
                    <form method="POST" action="{{ url_for('delete_criminal_route', name=criminal.name) }}" style="flex: 1; margin: 0;" onsubmit="return confirm('Delete {{ criminal.name }}?');">
                        <button type="submit" class="delete-btn" style="width: 100%;">Delete</button>
                    </form>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
